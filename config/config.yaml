# ML pipeline configuration.
#
# `model.target_metric` (singular) is read by src/recommend.py and
# src/evaluate_accuracy.py -- the live recommendation-scoring model still
# acts on one scalar prediction per entity for now.
#
# `model.target_metrics` (plural) is read by scripts/build_dataset.py (builds
# a label_<metric> column for each) and src/train.py (trains + compares the
# full model suite for each, independently -- see the "4 independent models"
# design decision in this project's history, not one joint multi-output
# model). See src/metrics.py for the full registry of supported metrics and
# how to add new ones. Everything downstream (features, labels, training)
# reads these values -- nothing else needs to change to add a metric.

model:
  target_metric: conversions                          # one of: conversions | clicks | cpa | cpc | roas | conversion_rate | ctr
  target_metrics: [conversions, clicks, cpc, cpa]      # every metric build_dataset.py labels + train.py trains a full model suite for
  grain: ad_group                   # forecasts are made per (client, campaign, ad_group)
  forecast_horizon_days: 7          # how many days into the future to forecast
  lookback_window_days: 30          # how much history to pull per entity
  rolling_windows: [7, 14, 30]      # rolling feature windows, in days

training:
  test_size_days: 14                # held-out final evaluation window
  validation_size_days: 14          # held-out window for early stopping

# Recommendation-engine guardrails (see src/recommend.py). Recommendation-only
# for now -- every record produced carries requires_human_review=true.
recommendations:
  primary_model: xgboost                  # xgboost | lightgbm -- whichever the metrics.json "lower_test_mae" says is winning
  min_trailing_spend: 50                  # $ over the trailing horizon window; below this, suppress entirely (too little at stake)
  flag_percentile: 0.10                   # only the most extreme 10% of predicted-vs-baseline swings, ranked within each CLIENT's own ad groups, get surfaced
  high_spend_zero_forecast_spend: 100     # $ trailing spend threshold for the highest-severity "forecasted zero, real spend" flag

# Campaign-level spend -> conversions response-curve model ("Track A" -- see
# src/response_curve.py's module docstring for the full design rationale).
# Grain is CAMPAIGN, not ad group/keyword -- a direct consequence of a data
# audit showing that's the only level with real historical budget-change
# ground truth and enough natural spend variation to fit a curve from.
response_curve:
  history_days: 380                       # how far back to pull from CAMPAIGNS_MAT (~= its full available history)
  window_days: 7                          # non-overlapping chunk size for the panel -- washes out day-of-week noise
  min_avg_daily_spend: 5                  # $ -- excludes campaigns that are negligible-spend THROUGHOUT (not individual low chunks)
  test_fraction: 0.2                      # fraction of most-recent periods held out as a genuine out-of-sample test
  stop_resume_spend_threshold: 20         # $ per chunk -- below this counts as "off" for stop/resume transition detection

# Optimization/guardrail v1 (see src/optimize.py's module docstring for the
# full design rationale): turns response_curve's fitted elasticity into an
# exact dollar spend-change recommendation per ad group.
optimization:
  window_days: 7                          # must match one of model.rolling_windows -- the grain the counterfactual is computed at
  min_trailing_spend: 50                   # $ -- suppress ad groups with too little at stake, same floor as recommendations.min_trailing_spend
  min_evidence_chunks: 8                   # parent campaign needs >= this many response-curve panel chunks (~2 months) before a dollar recommendation is trusted at all
  candidate_pct_changes: [-0.20, -0.10, 0.10, 0.20]  # grid of spend changes evaluated per ad group
  max_pct_change_per_cycle: 0.20           # hard cap on any single recommended change
  spend_range_tolerance: 0.15              # how far beyond the campaign's own historically observed spend range a candidate may push before being excluded as too speculative
  cpa_target_lookback_days: 90             # trailing window used to compute each campaign's avg value/conversion (for Target ROAS -> CPA) and each client's blended CPA fallback
  cpa_target_margin_pct: 0.05              # predicted CPA (conservative/lower-CI estimate) must clear the external CPA target by at least this much to recommend an increase -- see src/optimize.py's docstring for why this is compared to an EXTERNAL target, not the ad group's own average
  max_acceptable_conversion_loss_pct: 0.05 # max predicted conversion loss (conservative/upper-CI estimate) tolerated to recommend a decrease

paths:
  raw_data_cache: data/raw_ad_group_daily_performance.parquet
  processed_dataset: data/processed_dataset.parquet
  model_output: models/
  recommendations_output: data/recommendations.json
  campaign_raw_cache: data/raw_campaign_daily_performance.parquet
  response_curve_output: models/response_curve/
  spend_recommendations_output: data/spend_recommendations.json
